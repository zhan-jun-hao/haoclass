server:
  port: 8083

spring:
  application:
    name: coupon-service

  config:
    import: optional:nacos:${spring.application.name}.${spring.cloud.nacos.config.file-extension}

  cloud:
    nacos:
      server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
      discovery:
        server-addr: ${spring.cloud.nacos.server-addr}
        ip: ${NACOS_DISCOVERY_IP:127.0.0.1}
      config:
        server-addr: ${spring.cloud.nacos.server-addr}
        file-extension: yaml

logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-}]"
